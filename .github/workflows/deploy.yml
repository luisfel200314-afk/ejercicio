        with:
          fetch-depth: 0 # Permite obtener tags y versiÃ³n completa

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas (doble verificaciÃ³n)
