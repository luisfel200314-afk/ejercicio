on:
  push:
    branches: [main]

# Permisos necesarios para el despliegue
permissions:
  contents: read
  deployments: write # Si usas GitHub Deployments

jobs:
  test:
    name: Ejecutar Pruebas (antes de deploy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del cÃ³digo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm" # Mejora importante: usa cachÃ©

      - name: Instalar dependencias
        run: npm ci # MÃ¡s rÃ¡pido y determinista que npm install

      - name: Ejecutar pruebas
        run: npm test

