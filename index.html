<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculos CodeRider</title>
</head>
<body>

    <div class="container">
        <h1>Cálculos CodeRider</h1>

        <div class="input-group">
            <label for="numero1">Número 1:</label>
            <input type="number" id="numero1" value="10">
        </div>

        <div class="input-group">
            <label for="numero2">Número 2:</label>
            <input type="number" id="numero2" value="5">
        </div>

        <div class="input-group">
            <label for="operacion">Operación:</label>

            <select id="operacion">
                <option value="ejercicio6">Ejercicio 6</option>
                <option value="ejercicio7">Ejercicio 7</option>
                <option value="ejercicio8">Ejercicio 8</option>
                <option value="ejercicio9">Ejercicio 9</option>
                <option value="ejercicio10">Ejercicio 10</option>
                <option value="ejercicio11">Ejercicio 11</option>
        
            </select>
        </div>

        <button id="btncalcular">Calcular 🚀</button>
        <button id="btntest">Ejecutar Tests 🧪</button>

        <div class="resultados" id="resultados">
            El resultado aparecerá aquí...
        </div>

    </div>

    <script type="module" src="./src/main.js"></script>

</body>
</html>
